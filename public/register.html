<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Smart Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-subtitle">Start tracking your own expenses in minutes.</p>

      <form id="registerForm" class="expense-form">
        <div class="form-group">
          <label for="username">Username *</label>
          <input type="text" id="username" required minlength="3" placeholder="Your username">
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <button type="submit" class="btn btn-primary auth-btn" id="registerBtn">Register</button>
      </form>

      <p class="auth-link">Already have an account? <a href="/login.html">Login</a></p>
      <p id="authError" class="error-msg auth-error"></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
