<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Log in to manage your personal expenses.</p>

      <form id="loginForm" class="expense-form">
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" required minlength="6" placeholder="Enter password">
        </div>
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
        </div>
        <button type="submit" class="btn btn-primary auth-btn" id="loginBtn">Login</button>
      </form>

      <p class="auth-link">No account? <a href="/register.html">Create one</a></p>
      <p id="authError" class="error-msg auth-error"></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
